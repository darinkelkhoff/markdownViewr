<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{BASE_TAG}}
<style id="base-css">
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    height: 100%;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body-font);
    font-size: var(--base-font-size);
    line-height: var(--line-height);
    padding: 0;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: flex-start;
    min-height: 100vh;
}

#toc {
    position: sticky;
    top: 0;
    align-self: flex-start;
    flex: 0 0 auto;
    width: 0;
    max-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 24px 0;
    font-size: 1em;
    opacity: 0;
    transition: width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
}

#toc.visible {
    padding: 24px 12px 24px 16px;
    opacity: 1;
}

#toc.no-transition {
    transition: none;
}

#toc-resizer {
    position: sticky;
    top: 0;
    align-self: flex-start;
    flex: 0 0 6px;
    height: 100vh;
    margin-left: -3px;
    cursor: col-resize;
    z-index: 5;
    display: none;
}

#toc-resizer.visible {
    display: block;
}

#toc-resizer::before {
    content: "";
    position: absolute;
    left: 3px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: color-mix(in srgb, var(--text) 10%, transparent);
}

#toc-resizer:hover::before,
#toc-resizer.dragging::before {
    width: 2px;
    background: color-mix(in srgb, var(--link) 45%, transparent);
}

#toc ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

#toc li {
    margin-bottom: 6px;
}

#toc a {
    color: var(--text);
    opacity: 0.65;
    text-decoration: none;
    display: block;
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

#toc.wrap a {
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
}

#toc.bullets a::before {
    display: inline-block;
    flex: 0 0 auto;
    width: 1.8em;
    margin-right: 1px;
    font-size: 0.5em;
    line-height: 1;
    vertical-align: middle;
    position: relative;
    top: -0.15em;
    text-align: center;
    opacity: 0.6;
    -webkit-text-stroke: 0.4px currentColor;
}

/* When wrapping is on, hang-indent wrapped lines so text aligns past the marker. */
#toc.wrap.bullets a {
    display: flex;
    align-items: baseline;
}
#toc.bullets .toc-h1::before { content: "\25CF"; } /* ● filled circle */
#toc.bullets .toc-h2::before { content: "\25CB"; } /* ○ hollow circle */
#toc.bullets .toc-h3::before { content: "\25C6"; } /* ◆ filled diamond */
#toc.bullets .toc-h4::before { content: "\25C7"; } /* ◇ hollow diamond */
#toc.bullets .toc-h5::before { content: "\25A0"; } /* ■ filled square */
#toc.bullets .toc-h6::before { content: "\25A1"; } /* □ hollow square */

#toc a:hover {
    opacity: 1;
    background: color-mix(in srgb, var(--text) 8%, transparent);
}

#toc a.active {
    opacity: 1;
    color: var(--link);
    font-weight: 600;
}

#toc .toc-h2 { padding-left: 18px; }
#toc .toc-h3 { padding-left: 36px; }
#toc .toc-h4 { padding-left: 54px; }
#toc .toc-h5 { padding-left: 72px; }
#toc .toc-h6 { padding-left: 90px; }

#content {
    flex: 1;
    min-width: 0;
    min-height: 100vh;
    padding: 32px 48px;
}

h1, h2, h3, h4, h5, h6 { font-family: var(--heading-font); font-weight: 600; cursor: pointer; user-select: none; scroll-margin-top: 1rem; }
h1 .collapse-arrow, h2 .collapse-arrow, h3 .collapse-arrow,
h4 .collapse-arrow, h5 .collapse-arrow, h6 .collapse-arrow {
    display: inline-block;
    width: 0.6em;
    font-size: 0.6em;
    margin-right: 10px;
    transition: transform 0.15s ease;
    opacity: 0.4;
    vertical-align: middle;
}
h1:hover .collapse-arrow, h2:hover .collapse-arrow, h3:hover .collapse-arrow,
h4:hover .collapse-arrow, h5:hover .collapse-arrow, h6:hover .collapse-arrow {
    opacity: 0.8;
}
h1.collapsed .collapse-arrow, h2.collapsed .collapse-arrow, h3.collapsed .collapse-arrow,
h4.collapsed .collapse-arrow, h5.collapsed .collapse-arrow, h6.collapsed .collapse-arrow {
    transform: rotate(-90deg);
}
h1 { color: var(--h1); font-size: var(--h1-size); margin: 24px 0 16px 0; padding-bottom: 8px; border-bottom: 1px solid color-mix(in srgb, var(--text) 20%, transparent); }
h2 { color: var(--h2); font-size: var(--h2-size); margin: 20px 0 12px 0; padding-bottom: 6px; border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent); }
h3 { color: var(--h3); font-size: var(--h3-size); margin: 18px 0 10px 0; }
h4 { color: var(--h4); font-size: var(--h4-size); margin: 16px 0 8px 0; }
h5 { color: var(--h5); font-size: var(--h5-size); margin: 14px 0 6px 0; }
h6 { color: var(--h6); font-size: var(--h6-size); margin: 14px 0 6px 0; }

h1:first-child, h2:first-child, h3:first-child { margin-top: 0; }

p {
    margin: 0 0 16px 0;
}

a {
    color: var(--link);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

pre {
    background: var(--code-bg);
    border-radius: 8px;
    padding: 16px;
    margin: 0 0 16px 0;
    overflow-x: auto;
}

pre code {
    font-family: var(--code-font);
    font-size: var(--code-font-size);
    color: var(--code-text);
    background: none;
    padding: 0;
    border-radius: 0;
}

code {
    font-family: var(--code-font);
    font-size: 0.9em;
    background: var(--code-bg);
    color: var(--code-text);
    padding: 2px 6px;
    border-radius: 4px;
}

blockquote {
    border-left: 3px solid var(--blockquote-border);
    padding: 8px 16px;
    margin: 0 0 16px 0;
    background: color-mix(in srgb, var(--blockquote-bg) 50%, transparent);
    border-radius: 0 8px 8px 0;
}

blockquote blockquote {
    background: color-mix(in srgb, var(--blockquote-bg) 75%, transparent);
}

blockquote blockquote blockquote {
    background: var(--blockquote-bg);
}

blockquote p:last-child {
    margin-bottom: 0;
}

ul, ol {
    padding-left: 24px;
    margin: 0 0 16px 0;
}

li {
    margin-bottom: 4px;
}

li > ul, li > ol {
    margin-top: 4px;
    margin-bottom: 4px;
}

hr {
    border: none;
    border-top: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
    margin: 24px 0;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin: 0 0 16px 0;
}

th, td {
    border: 1px solid color-mix(in srgb, var(--text) 20%, transparent);
    padding: 8px 12px;
    text-align: left;
}

th {
    background: var(--code-bg);
    font-weight: 600;
}

img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
}

del {
    opacity: 0.6;
}

mark {
    background-color: var(--highlight-bg);
    color: var(--highlight-text);
    border-radius: 2px;
    padding: 0 2px;
}

.frontmatter {
    margin: 0 0 24px 0;
    padding: 12px 16px;
    background: var(--blockquote-bg);
    border-radius: 8px;
    border-left: 3px solid var(--blockquote-border);
    font-size: 0.85em;
}

.frontmatter table {
    width: auto;
    border: none;
    margin: 0;
}

.frontmatter td {
    border: none;
    padding: 2px 12px 2px 0;
    vertical-align: top;
}

.frontmatter .fm-key {
    color: var(--link);
    font-weight: 600;
    white-space: nowrap;
}
</style>
<style id="theme-css">
{{THEME_CSS}}
</style>
</head>
<body>
<nav id="toc" class="no-transition"></nav>
<div id="toc-resizer"></div>
<div id="content">
{{CONTENT}}
</div>
<script>
function updateThemeCSS(css) {
    document.getElementById('theme-css').textContent = css;
}

function updateContent(html) {
    var scrollRatio = document.documentElement.scrollTop /
        Math.max(1, document.documentElement.scrollHeight - document.documentElement.clientHeight);
    document.getElementById('content').innerHTML = html;
    var newMax = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    document.documentElement.scrollTop = scrollRatio * newMax;
    setupCollapsibleHeadings();
    if (_tocVisible) buildTOC();
}

var _findMatches = [];
var _findIndex = -1;

function findAll(query) {
    clearFind();
    if (!query) return JSON.stringify({current: 0, total: 0});

    var content = document.getElementById('content');
    var walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null);
    var textNodes = [];
    var node;
    while (node = walker.nextNode()) textNodes.push(node);

    var lowerQuery = query.toLowerCase();
    for (var i = 0; i < textNodes.length; i++) {
        var n = textNodes[i];
        var text = n.textContent;
        var lower = text.toLowerCase();
        var idx = 0;
        while ((idx = lower.indexOf(lowerQuery, idx)) !== -1) {
            var range = document.createRange();
            range.setStart(n, idx);
            range.setEnd(n, idx + query.length);
            var mark = document.createElement('mark');
            mark.className = 'find-match';
            mark.style.background = 'color-mix(in srgb, var(--text) 25%, transparent)';
            mark.style.color = 'inherit';
            mark.style.borderRadius = '2px';
            range.surroundContents(mark);
            _findMatches.push(mark);
            // After surroundContents, the text node is split; re-walk from mark's next sibling
            n = mark.nextSibling;
            if (!n) break;
            lower = n.textContent.toLowerCase();
            idx = 0;
        }
    }

    if (_findMatches.length > 0) {
        _findIndex = 0;
        highlightCurrent();
    }
    return JSON.stringify({current: _findIndex + 1, total: _findMatches.length});
}

function findNext() {
    if (_findMatches.length === 0) return JSON.stringify({current: 0, total: 0});
    unhighlightCurrent();
    _findIndex = (_findIndex + 1) % _findMatches.length;
    highlightCurrent();
    return JSON.stringify({current: _findIndex + 1, total: _findMatches.length});
}

function findPrev() {
    if (_findMatches.length === 0) return JSON.stringify({current: 0, total: 0});
    unhighlightCurrent();
    _findIndex = (_findIndex - 1 + _findMatches.length) % _findMatches.length;
    highlightCurrent();
    return JSON.stringify({current: _findIndex + 1, total: _findMatches.length});
}

function highlightCurrent() {
    if (_findIndex >= 0 && _findIndex < _findMatches.length) {
        _findMatches[_findIndex].style.background = 'color-mix(in srgb, var(--text) 40%, transparent)';
        _findMatches[_findIndex].style.outline = '2px solid color-mix(in srgb, var(--link) 60%, transparent)';
        _findMatches[_findIndex].scrollIntoView({block: 'center', behavior: 'smooth'});
    }
}

function unhighlightCurrent() {
    if (_findIndex >= 0 && _findIndex < _findMatches.length) {
        _findMatches[_findIndex].style.background = 'color-mix(in srgb, var(--text) 25%, transparent)';
        _findMatches[_findIndex].style.outline = 'none';
    }
}

function clearFind() {
    for (var i = 0; i < _findMatches.length; i++) {
        var mark = _findMatches[i];
        var parent = mark.parentNode;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
        parent.normalize();
    }
    _findMatches = [];
    _findIndex = -1;
}

function headingLevel(el) {
    var m = el.tagName.match(/^H(\d)$/i);
    return m ? parseInt(m[1]) : 0;
}

function setupCollapsibleHeadings() {
    var content = document.getElementById('content');
    var headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
    for (var i = 0; i < headings.length; i++) {
        var h = headings[i];
        if (h.querySelector('.collapse-arrow')) continue;
        var arrow = document.createElement('span');
        arrow.className = 'collapse-arrow';
        arrow.textContent = '▼';
        h.insertBefore(arrow, h.firstChild);
        h.addEventListener('click', toggleCollapse);
    }
}

function toggleCollapse(e) {
    var h = e.currentTarget;
    var level = headingLevel(h);
    var collapsed = h.classList.toggle('collapsed');
    var sibling = h.nextElementSibling;
    // When expanding, track whether we're inside a child heading that's still collapsed
    var hiddenByChildLevel = 0;
    while (sibling) {
        var sibLevel = headingLevel(sibling);
        // Stop at same-or-higher level heading
        if (sibLevel > 0 && sibLevel <= level) break;

        if (collapsed) {
            sibling.style.display = 'none';
        } else {
            // Expanding: check if a child heading is still collapsed
            if (sibLevel > 0) {
                // This is a sub-heading — always show it
                sibling.style.display = '';
                // But if it's collapsed, hide its contents
                if (sibling.classList.contains('collapsed')) {
                    hiddenByChildLevel = sibLevel;
                } else {
                    // Not collapsed, and not inside another collapsed section
                    if (hiddenByChildLevel > 0 && sibLevel <= hiddenByChildLevel) {
                        hiddenByChildLevel = 0;
                    }
                }
            } else {
                // Non-heading content: show only if not hidden by a collapsed child
                sibling.style.display = hiddenByChildLevel > 0 ? 'none' : '';
            }
        }
        sibling = sibling.nextElementSibling;
    }
}

var _tocMaxDepth = 3;
var _tocVisible = false;
var _tocWidth = 220;
var _tocWrap = false;
var _tocBullets = false;

function buildTOC() {
    var toc = document.getElementById('toc');
    var content = document.getElementById('content');
    var headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
    var ul = document.createElement('ul');

    for (var i = 0; i < headings.length; i++) {
        var h = headings[i];
        var level = headingLevel(h);
        if (level > _tocMaxDepth || level === 0) continue;

        // Ensure heading has an id for linking
        if (!h.id) {
            var text = h.textContent.replace(/^▼\s*/, '').trim();
            h.id = 'heading-' + i;
        }

        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.className = 'toc-h' + level;
        var headingText = h.textContent.replace(/^▼\s*/, '').trim();
        a.textContent = headingText;
        a.title = headingText;
        a.dataset.headingId = h.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            var target = document.getElementById(this.dataset.headingId);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        ul.appendChild(li);
    }

    toc.innerHTML = '';
    toc.appendChild(ul);
    if (_tocVisible) toc.classList.add('visible');
}

function setTOCVisible(visible) {
    _tocVisible = visible;
    var toc = document.getElementById('toc');
    var resizer = document.getElementById('toc-resizer');
    if (visible) {
        buildTOC();
        setupTOCScrollHighlight();
        toc.classList.add('visible');
        toc.style.width = _tocWidth + 'px';
        if (resizer) resizer.classList.add('visible');
    } else {
        toc.classList.remove('visible');
        toc.style.width = '0px';
        // Keep the divider through the collapse animation, then hide it.
        if (resizer) {
            setTimeout(function() {
                if (!_tocVisible) resizer.classList.remove('visible');
            }, 300);
        }
    }
}

// Removes the no-transition guard after initial state is applied, so the first
// document render doesn't animate but later toggles do.
function enableTOCTransitions() {
    requestAnimationFrame(function() {
        document.getElementById('toc').classList.remove('no-transition');
    });
}

function setTOCDepth(depth) {
    _tocMaxDepth = depth;
    if (_tocVisible) buildTOC();
}

function setTOCWidth(px) {
    _tocWidth = Math.max(150, Math.min(500, px));
    if (_tocVisible) document.getElementById('toc').style.width = _tocWidth + 'px';
}

function setTOCWrap(wrap) {
    _tocWrap = wrap;
    var toc = document.getElementById('toc');
    if (wrap) toc.classList.add('wrap'); else toc.classList.remove('wrap');
}

function setTOCBullets(on) {
    _tocBullets = on;
    var toc = document.getElementById('toc');
    if (on) toc.classList.add('bullets'); else toc.classList.remove('bullets');
}

// Drag-to-resize the TOC; reports the final width back to the app to persist.
(function() {
    var resizer = document.getElementById('toc-resizer');
    var toc = document.getElementById('toc');
    if (!resizer || !toc) return;
    var dragging = false;
    resizer.addEventListener('mousedown', function(e) {
        dragging = true;
        resizer.classList.add('dragging');
        toc.classList.add('no-transition');
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
        e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        setTOCWidth(e.clientX - toc.getBoundingClientRect().left);
    });
    document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        resizer.classList.remove('dragging');
        toc.classList.remove('no-transition');
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.tocWidth) {
            window.webkit.messageHandlers.tocWidth.postMessage(_tocWidth);
        }
    });
})();

function setupTOCScrollHighlight() {
    // Debounced scroll handler to highlight active TOC entry
    var timeout;
    window.addEventListener('scroll', function() {
        clearTimeout(timeout);
        timeout = setTimeout(highlightActiveTOC, 50);
    });
}

function highlightActiveTOC() {
    var toc = document.getElementById('toc');
    if (!toc.classList.contains('visible')) return;

    var links = toc.querySelectorAll('a');
    var scrollTop = window.scrollY || document.documentElement.scrollTop;
    var activeLink = null;

    for (var i = 0; i < links.length; i++) {
        var target = document.getElementById(links[i].dataset.headingId);
        if (target && target.offsetTop <= scrollTop + 60) {
            activeLink = links[i];
        }
        links[i].classList.remove('active');
    }
    if (activeLink) activeLink.classList.add('active');
}

document.addEventListener('DOMContentLoaded', function() {
    setupCollapsibleHeadings();
    if (_tocVisible) {
        buildTOC();
        setupTOCScrollHighlight();
    }
});

var _vimPending = null;
var _vimTimeout = null;

function _vimLineHeight() {
    var cs = getComputedStyle(document.body);
    var lh = parseFloat(cs.lineHeight);
    if (!isFinite(lh)) lh = parseFloat(cs.fontSize) * 1.5;
    return lh;
}

function _vimClearPending() {
    _vimPending = null;
    if (_vimTimeout) { clearTimeout(_vimTimeout); _vimTimeout = null; }
}

function _vimSetPending(key) {
    _vimPending = key;
    if (_vimTimeout) clearTimeout(_vimTimeout);
    _vimTimeout = setTimeout(_vimClearPending, 500);
}

function _vimJumpHeading(dir) {
    var all = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
    var visible = [];
    for (var i = 0; i < all.length; i++) {
        if (all[i].offsetParent !== null) visible.push(all[i]);
    }
    var y = window.scrollY;
    var threshold = 2;
    var target = null;
    if (dir > 0) {
        for (var i = 0; i < visible.length; i++) {
            if (visible[i].offsetTop > y + threshold) { target = visible[i]; break; }
        }
    } else {
        for (var i = visible.length - 1; i >= 0; i--) {
            if (visible[i].offsetTop < y - threshold) { target = visible[i]; break; }
        }
    }
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function _vimSendMessage(action) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.vim) {
        window.webkit.messageHandlers.vim.postMessage(action);
    }
}

window.addEventListener('keydown', function(e) {
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.metaKey || e.altKey) return;

    var key = e.key;
    var ctrl = e.ctrlKey;

    if (_vimPending === 'g' && key === 'g' && !ctrl) {
        _vimClearPending();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        e.preventDefault();
        return;
    }
    if (_vimPending === ']' && key === ']' && !ctrl) {
        _vimClearPending();
        _vimJumpHeading(1);
        e.preventDefault();
        return;
    }
    if (_vimPending === '[' && key === '[' && !ctrl) {
        _vimClearPending();
        _vimJumpHeading(-1);
        e.preventDefault();
        return;
    }
    if (_vimPending) _vimClearPending();

    if (ctrl) {
        var vh = window.innerHeight;
        if (key === 'd') { window.scrollBy({ top: vh / 2, behavior: 'smooth' }); e.preventDefault(); return; }
        if (key === 'u') { window.scrollBy({ top: -vh / 2, behavior: 'smooth' }); e.preventDefault(); return; }
        if (key === 'f') { window.scrollBy({ top: vh, behavior: 'smooth' }); e.preventDefault(); return; }
        if (key === 'b') { window.scrollBy({ top: -vh, behavior: 'smooth' }); e.preventDefault(); return; }
        return;
    }

    switch (key) {
        case 'j':
            window.scrollBy({ top: _vimLineHeight(), behavior: 'smooth' });
            e.preventDefault();
            break;
        case 'k':
            window.scrollBy({ top: -_vimLineHeight(), behavior: 'smooth' });
            e.preventDefault();
            break;
        case 'G':
            window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
            e.preventDefault();
            break;
        case 'g':
            _vimSetPending('g');
            e.preventDefault();
            break;
        case ']':
            _vimSetPending(']');
            e.preventDefault();
            break;
        case '[':
            _vimSetPending('[');
            e.preventDefault();
            break;
        case 'n':
            if (_findMatches.length > 0) _vimSendMessage('findNext');
            e.preventDefault();
            break;
        case 'N':
            if (_findMatches.length > 0) _vimSendMessage('findPrev');
            e.preventDefault();
            break;
        case '/':
            _vimSendMessage('focusFind');
            e.preventDefault();
            break;
        case 'Escape':
            clearFind();
            e.preventDefault();
            break;
    }
});
</script>
</body>
</html>
