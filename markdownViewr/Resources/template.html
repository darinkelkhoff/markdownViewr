<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style id="base-css">
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: var(--bg);
}

::-webkit-scrollbar-thumb {
    background: color-mix(in srgb, var(--text) 30%, var(--bg));
    border: 3px solid var(--bg);
    border-radius: 999px;
}

::-webkit-scrollbar-thumb:hover {
    background: color-mix(in srgb, var(--text) 45%, var(--bg));
}

::-webkit-scrollbar-corner {
    background: var(--bg);
}

html {
    height: 100%;
    overflow: hidden;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body-font);
    font-size: var(--base-font-size);
    line-height: var(--line-height);
    padding: 0;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: flex-start;
    height: 100vh;
    overflow: hidden;
}

#toc {
    position: sticky;
    top: 0;
    align-self: flex-start;
    flex: 0 0 auto;
    width: 0;
    max-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 24px 0;
    font-size: 1em;
    opacity: 0;
    transition: width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
}

#toc.visible {
    padding: 24px 12px 24px 16px;
    opacity: 1;
}

#toc.no-transition {
    transition: none;
}

.resizer {
    position: sticky;
    top: 0;
    align-self: flex-start;
    flex: 0 0 6px;
    height: 100vh;
    margin-left: -3px;
    cursor: col-resize;
    z-index: 5;
    display: none;
}

.resizer.visible {
    display: block;
}

.resizer::before {
    content: "";
    position: absolute;
    left: 3px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: color-mix(in srgb, var(--text) 10%, transparent);
}

.resizer:hover::before,
.resizer.dragging::before {
    width: 2px;
    background: color-mix(in srgb, var(--link) 45%, transparent);
}

#raw-source {
    position: sticky;
    top: 0;
    align-self: flex-start;
    flex: 0 0 auto;
    width: 0;
    max-height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
    opacity: 0;
    transition: width 0.3s ease, opacity 0.3s ease;
}

#raw-source.visible {
    opacity: 1;
}

#raw-source.no-transition {
    transition: none;
}

#raw-source pre {
    margin: 0;
    padding: 32px 20px;
    font-family: var(--code-font);
    font-size: var(--code-font-size);
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    tab-size: 4;
    border-radius: 0;
}

#raw-source .raw-ellipsis {
    display: none;
    opacity: 0.4;
}

#toc ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

#toc li {
    margin-bottom: 6px;
}

#toc a {
    color: var(--text);
    opacity: 0.65;
    text-decoration: none;
    display: block;
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

#toc.wrap a {
    white-space: normal;
    overflow: visible;
    text-overflow: clip;
}

#toc.bullets a::before {
    display: inline-block;
    flex: 0 0 auto;
    width: 1.8em;
    margin-right: 1px;
    font-size: 0.5em;
    line-height: 1;
    vertical-align: middle;
    position: relative;
    top: -0.15em;
    text-align: center;
    opacity: 0.6;
    -webkit-text-stroke: 0.4px currentColor;
}

/* When wrapping is on, hang-indent wrapped lines so text aligns past the marker. */
#toc.wrap.bullets a {
    display: flex;
    align-items: baseline;
}
#toc.bullets .toc-h1::before { content: "\25CF"; } /* ● filled circle */
#toc.bullets .toc-h2::before { content: "\25CB"; } /* ○ hollow circle */
#toc.bullets .toc-h3::before { content: "\25C6"; } /* ◆ filled diamond */
#toc.bullets .toc-h4::before { content: "\25C7"; } /* ◇ hollow diamond */
#toc.bullets .toc-h5::before { content: "\25A0"; } /* ■ filled square */
#toc.bullets .toc-h6::before { content: "\25A1"; } /* □ hollow square */

#toc a:hover {
    opacity: 1;
    background: color-mix(in srgb, var(--text) 8%, transparent);
}

#toc a.active {
    opacity: 1;
    color: var(--link);
    font-weight: 600;
}

#toc .toc-h2 { padding-left: 18px; }
#toc .toc-h3 { padding-left: 36px; }
#toc .toc-h4 { padding-left: 54px; }
#toc .toc-h5 { padding-left: 72px; }
#toc .toc-h6 { padding-left: 90px; }

#content {
    flex: 1;
    min-width: 0;
    height: 100vh;
    overflow-x: hidden;
    overflow-y: auto;
}

#content-inner {
    padding: 32px 48px;
}

h1, h2, h3, h4, h5, h6 { font-family: var(--heading-font); font-weight: 600; cursor: pointer; user-select: none; scroll-margin-top: 1rem; }
h1 .collapse-arrow, h2 .collapse-arrow, h3 .collapse-arrow,
h4 .collapse-arrow, h5 .collapse-arrow, h6 .collapse-arrow {
    display: inline-block;
    width: 0.6em;
    font-size: 0.6em;
    margin-right: 10px;
    transition: transform 0.15s ease;
    opacity: 0.4;
    vertical-align: middle;
}
h1:hover .collapse-arrow, h2:hover .collapse-arrow, h3:hover .collapse-arrow,
h4:hover .collapse-arrow, h5:hover .collapse-arrow, h6:hover .collapse-arrow {
    opacity: 0.8;
}
h1.collapsed .collapse-arrow, h2.collapsed .collapse-arrow, h3.collapsed .collapse-arrow,
h4.collapsed .collapse-arrow, h5.collapsed .collapse-arrow, h6.collapsed .collapse-arrow {
    transform: rotate(-90deg);
}
h1 { color: var(--h1); font-size: var(--h1-size); margin: 24px 0 16px 0; padding-bottom: 8px; border-bottom: 1px solid color-mix(in srgb, var(--text) 20%, transparent); }
h2 { color: var(--h2); font-size: var(--h2-size); margin: 20px 0 12px 0; padding-bottom: 6px; border-bottom: 1px solid color-mix(in srgb, var(--text) 10%, transparent); }
h3 { color: var(--h3); font-size: var(--h3-size); margin: 18px 0 10px 0; }
h4 { color: var(--h4); font-size: var(--h4-size); margin: 16px 0 8px 0; }
h5 { color: var(--h5); font-size: var(--h5-size); margin: 14px 0 6px 0; }
h6 { color: var(--h6); font-size: var(--h6-size); margin: 14px 0 6px 0; }

h1:first-child, h2:first-child, h3:first-child { margin-top: 0; }

p {
    margin: 0 0 16px 0;
}

a {
    color: var(--link);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

pre {
    background: var(--code-bg);
    border-radius: 8px;
    padding: 16px;
    margin: 0 0 16px 0;
    overflow-x: auto;
}

pre code {
    font-family: var(--code-font);
    font-size: var(--code-font-size);
    color: var(--code-text);
    background: none;
    padding: 0;
    border-radius: 0;
}

code {
    font-family: var(--code-font);
    font-size: 0.9em;
    background: var(--code-bg);
    color: var(--code-text);
    padding: 2px 6px;
    border-radius: 4px;
}

blockquote {
    border-left: 3px solid var(--blockquote-border);
    padding: 8px 16px;
    margin: 0 0 16px 0;
    background: color-mix(in srgb, var(--blockquote-bg) 50%, transparent);
    border-radius: 0 8px 8px 0;

blockquote blockquote {
    background: color-mix(in srgb, var(--blockquote-bg) 75%, transparent);
}

blockquote blockquote blockquote {
    background: var(--blockquote-bg);
}

blockquote p:last-child {

}

ul, ol {
    padding-left: 24px;

}

li {

li.task-list-item {

hr {

table {

th, td {

img {

del {

mark {

.frontmatter {
    margin: 0 0 24px 0;

    border-radius: 8px;
    border-left: 3px solid var(--blockquote-border);

}

.frontmatter table {
    width: auto;
    border: none;
    margin: 0;

.frontmatter td {
    border: none;

.frontmatter .fm-key {

@media print {
    * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }

    html, body {
        height: auto !important;
        overflow: visible !important;
        display: block !important;
        background-color: var(--bg) !important;
        color: var(--text) !important;
    }

    #content {
        flex: none !important;
        height: auto !important;
        overflow: visible !important;
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
        display: block !important;
    }

    #content-inner {
        padding: var(--print-padding, 0px) !important;
        margin: 0 !important;
    }

    /* Force collapsed editor sections to print expanded */
    #content-inner > * {
        display: revert !important;
    }

    html.print-full-width #content-inner {
        max-width: none !important;
    }

    #toc, #toc-resizer, #raw-resizer, #raw-source, .collapse-arrow, .resizer {
        display: none !important;
    }

    html.print-no-backgrounds, html.print-no-backgrounds body {
        background-color: #ffffff !important;
        color: #000000 !important;
    }

    html.print-no-backgrounds * {
        -webkit-print-color-adjust: economy !important;
        print-color-adjust: economy !important;
        background: transparent !important;
        background-color: transparent !important;
        background-image: none !important;
        /* Avoid light text rendering on white backgrounds */
        color: #000000 !important;
    }

    /* Maintain link readability in ink-saving mode */
    html.print-no-backgrounds a {
        color: #0969da !important;
        text-decoration: underline !important;
    }

    /* Ensure rules and borders are visible in ink-saving mode */
    html.print-no-backgrounds hr {
        border-top: 1px solid #dddddd !important;
    }
    html.print-no-backgrounds th,
    html.print-no-backgrounds td {
        border: 1px solid #dddddd !important;
    }
    html.print-no-backgrounds blockquote {
        border-left: 3px solid #cccccc !important;
    }
    html.print-no-backgrounds h1 {
        border-bottom: 1px solid #dddddd !important;
    }
    html.print-no-backgrounds h2 {
        border-bottom: 1px solid #eeeeee !important;
    }

    /* Add borders to content blocks that have custom background colors when print-borders is active */
    html.print-borders pre,
    html.print-borders .frontmatter {
        border: 1px solid color-mix(in srgb, var(--text) 25%, transparent) !important;
    }

    html.print-borders blockquote {
        border: 1px solid color-mix(in srgb, var(--text) 20%, transparent) !important;
        border-left: 4px solid var(--blockquote-border) !important;
    }

    html.print-borders code {
        border: 1px solid color-mix(in srgb, var(--text) 30%, transparent) !important;
    }

    /* Specific override to strip images when printImages is false */
    html.print-no-images #content-inner img,
    html.print-no-images #content-inner > img {
        display: none !important;
    }

    /* Print Layout/Rendering Optimizations */
    h1, h2, h3, h4, h5, h6 {
        break-after: avoid !important;
        page-break-after: avoid !important;
    }

    /* Keep lists and table rows unbroken on page boundaries */
    pre, blockquote, tr, li {
        break-inside: avoid !important;
        page-break-inside: avoid !important;
    }

    img {
        max-width: 100% !important;
        break-inside: avoid !important;
        page-break-inside: avoid !important;
    }

    thead {
        display: table-header-group !important;
    }

    th, td {
        word-wrap: break-word !important;
        white-space: normal !important;
    }
}

<script>
function _contentScroller() {
    return document.getElementById('content');
}

function _contentContainer() {
    return document.getElementById('content-inner');
}

function updateThemeCSS(css) {
    document.getElementById('theme-css').textContent = css;
}

function updateContent(html) {
    var content = _contentScroller();
    var scrollRatio = content.scrollTop /
        Math.max(1, content.scrollHeight - content.clientHeight);
    _contentContainer().innerHTML = html;
    var newMax = content.scrollHeight - content.clientHeight;
    content.scrollTop = scrollRatio * newMax;
    setupCollapsibleHeadings();
    if (_tocVisible) buildTOC();
    _rebuildSyncAnchors();
}

var _findPairs = [];
var _findIndex = -1;
var _allFindMarks = [];

function _findStatus() {
    return JSON.stringify({ current: _findIndex + 1, total: _findPairs.length });
}

function _styleMark(mark, active) {
    if (active) {
        mark.style.background = 'color-mix(in srgb, var(--text) 40%, transparent)';
        mark.style.outline = '2px solid color-mix(in srgb, var(--link) 60%, transparent)';
    } else {
        mark.style.background = 'color-mix(in srgb, var(--text) 25%, transparent)';
        mark.style.outline = 'none';
    }
}

// Wrap every occurrence of query within root in a <mark>; returns the marks in order.
function _markMatchesIn(root, query) {
    var marks = [];
    if (!root) return marks;
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    var textNodes = [];
    var node;
    while (node = walker.nextNode()) textNodes.push(node);

    var lowerQuery = query.toLowerCase();
    for (var i = 0; i < textNodes.length; i++) {
        var n = textNodes[i];
        var lower = n.textContent.toLowerCase();
        var idx = 0;
        while ((idx = lower.indexOf(lowerQuery, idx)) !== -1) {
            var range = document.createRange();
            range.setStart(n, idx);
            range.setEnd(n, idx + query.length);
            var mark = document.createElement('mark');
            mark.className = 'find-match';
            mark.style.color = 'inherit';
            mark.style.borderRadius = '2px';
            range.surroundContents(mark);
            _styleMark(mark, false);
            marks.push(mark);
            _allFindMarks.push(mark);
            n = mark.nextSibling;
            if (!n) break;
            lower = n.textContent.toLowerCase();
            idx = 0;
        }
    }
    return marks;
}

function findAll(query) {
    clearFind();
    if (!query) return _findStatus();

    var contentMarks = _markMatchesIn(document.getElementById('content'), query);
    var rawMarks = _rawVisible ? _markMatchesIn(document.getElementById('raw-source'), query) : [];

    // Pair the k-th rendered hit with the k-th source hit so next/prev moves both panes.
    var n = Math.max(contentMarks.length, rawMarks.length);
    for (var k = 0; k < n; k++) {
        _findPairs.push({ c: contentMarks[k] || null, r: rawMarks[k] || null });
    }

    if (_findPairs.length > 0) {
        _findIndex = 0;
        highlightCurrent();
    }
    return _findStatus();
}

function findNext() {
    if (_findPairs.length === 0) return _findStatus();
    unhighlightCurrent();
    _findIndex = (_findIndex + 1) % _findPairs.length;
    highlightCurrent();
    return _findStatus();
}

function findPrev() {
    if (_findPairs.length === 0) return _findStatus();
    unhighlightCurrent();
    _findIndex = (_findIndex - 1 + _findPairs.length) % _findPairs.length;
    highlightCurrent();
    return _findStatus();
}

function highlightCurrent() {
    var pair = _findPairs[_findIndex];
    if (!pair) return;
    // Pause scroll-sync so find's explicit dual-scroll isn't overridden.
    _findScrolling = true;
    clearTimeout(_findScrollTimer);
    _findScrollTimer = setTimeout(function() { _findScrolling = false; }, 600);
    if (pair.c) {
        _styleMark(pair.c, true);
        pair.c.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
    if (pair.r) {
        _styleMark(pair.r, true);
        _scrollRawCenter(pair.r);
    }
}

function unhighlightCurrent() {
    var pair = _findPairs[_findIndex];
    if (!pair) return;
    if (pair.c) _styleMark(pair.c, false);
    if (pair.r) _styleMark(pair.r, false);
}

// Scroll only the raw pane (not the window) to center a mark within it.
function _scrollRawCenter(mark) {
    var raw = document.getElementById('raw-source');
    if (!raw) return;
    var top = mark.getBoundingClientRect().top - raw.getBoundingClientRect().top + raw.scrollTop;
    raw.scrollTo({ top: top - raw.clientHeight / 2, behavior: 'smooth' });
}

function clearFind() {
    for (var i = 0; i < _allFindMarks.length; i++) {
        var mark = _allFindMarks[i];
        var parent = mark.parentNode;
        if (!parent) continue;
        while (mark.firstChild) parent.insertBefore(mark.firstChild, mark);
        parent.removeChild(mark);
        parent.normalize();
    }
    _allFindMarks = [];
    _findPairs = [];
    _findIndex = -1;
}

function headingLevel(el) {
    var m = el.tagName.match(/^H(\d)$/i);
    return m ? parseInt(m[1]) : 0;
}

function setupCollapsibleHeadings() {
    var content = document.getElementById('content');
    var headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
    for (var i = 0; i < headings.length; i++) {
        var h = headings[i];
        if (h.querySelector('.collapse-arrow')) continue;
        var arrow = document.createElement('span');
        arrow.className = 'collapse-arrow';
        arrow.textContent = '▼';
        h.insertBefore(arrow, h.firstChild);
        h.addEventListener('click', toggleCollapse);
    }
}

function toggleCollapse(e) {
    var h = e.currentTarget;
    if (e.altKey) {
        // Option-click: anchor/jump to this header (both panes follow via scroll-sync).
        h.scrollIntoView({ block: 'start', behavior: 'smooth' });
        return;
    }
    var level = headingLevel(h);
    var collapsed = h.classList.toggle('collapsed');
    var sibling = h.nextElementSibling;
    // When expanding, track whether we're inside a child heading that's still collapsed
    var hiddenByChildLevel = 0;
    while (sibling) {
        var sibLevel = headingLevel(sibling);
        // Stop at same-or-higher level heading
        if (sibLevel > 0 && sibLevel <= level) break;

        if (collapsed) {
            sibling.style.display = 'none';
        } else {
            // Expanding: check if a child heading is still collapsed
            if (sibLevel > 0) {
                // This is a sub-heading — always show it
                sibling.style.display = '';
                // But if it's collapsed, hide its contents
                if (sibling.classList.contains('collapsed')) {
                    hiddenByChildLevel = sibLevel;
                } else {
                    // Not collapsed, and not inside another collapsed section
                    if (hiddenByChildLevel > 0 && sibLevel <= hiddenByChildLevel) {
                        hiddenByChildLevel = 0;
                    }
                }
            } else {
                // Non-heading content: show only if not hidden by a collapsed child
                sibling.style.display = hiddenByChildLevel > 0 ? 'none' : '';
            }
        }
        sibling = sibling.nextElementSibling;
    }
    applyRawCollapse();
}

var _tocMaxDepth = 3;
var _tocVisible = false;
var _tocWidth = 220;
var _tocWrap = false;
var _tocBullets = false;
var _rawVisible = false;
var _rawWidth = 400;
var _syncContentHeadings = [];
var _syncRawHeadings = [];
var _suppressContentSync = false;
var _suppressRawSync = false;
var _supContentTimer = null;
var _supRawTimer = null;
var _findScrolling = false;
var _findScrollTimer = null;
var _syncRafC = null;
var _syncRafR = null;

function buildTOC() {
    var toc = document.getElementById('toc');
    var content = document.getElementById('content');
    var headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
    var ul = document.createElement('ul');

    for (var i = 0; i < headings.length; i++) {
        var h = headings[i];
        var level = headingLevel(h);
        if (level > _tocMaxDepth || level === 0) continue;

        // Ensure heading has an id for linking
        if (!h.id) {
            var text = h.textContent.replace(/^▼\s*/, '').trim();
            h.id = 'heading-' + i;
        }

        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.className = 'toc-h' + level;
        var headingText = h.textContent.replace(/^▼\s*/, '').trim();
        a.textContent = headingText;
        a.title = headingText;
        a.dataset.headingId = h.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            var target = document.getElementById(this.dataset.headingId);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        ul.appendChild(li);
    }

    toc.innerHTML = '';
    toc.appendChild(ul);
    if (_tocVisible) toc.classList.add('visible');
}

function setTOCVisible(visible) {
    _tocVisible = visible;
    var toc = document.getElementById('toc');
    var resizer = document.getElementById('toc-resizer');
    if (visible) {
        buildTOC();
        setupTOCScrollHighlight();
        toc.classList.add('visible');
        toc.style.width = _tocWidth + 'px';
        if (resizer) resizer.classList.add('visible');
    } else {
        toc.classList.remove('visible');
        toc.style.width = '0px';
        // Keep the divider through the collapse animation, then hide it.
        if (resizer) {
            setTimeout(function() {
                if (!_tocVisible) resizer.classList.remove('visible');
            }, 300);
        }
    }
}

// Removes the no-transition guard after initial state is applied, so the first
// document render doesn't animate but later toggles do.
function enableTOCTransitions() {
    requestAnimationFrame(function() {
        document.getElementById('toc').classList.remove('no-transition');
        var raw = document.getElementById('raw-source');
        if (raw) raw.classList.remove('no-transition');
    });
}

function setTOCDepth(depth) {
    _tocMaxDepth = depth;
    if (_tocVisible) buildTOC();
}

function setTOCWidth(px) {
    _tocWidth = Math.max(150, Math.min(500, px));
    if (_tocVisible) document.getElementById('toc').style.width = _tocWidth + 'px';
}

function setTOCWrap(wrap) {
    _tocWrap = wrap;
    var toc = document.getElementById('toc');
    if (wrap) toc.classList.add('wrap'); else toc.classList.remove('wrap');
}

function setTOCBullets(on) {
    _tocBullets = on;
    var toc = document.getElementById('toc');
    if (on) toc.classList.add('bullets'); else toc.classList.remove('bullets');
}

function setRawVisible(visible) {
    _rawVisible = visible;
    var raw = document.getElementById('raw-source');
    var resizer = document.getElementById('raw-resizer');
    if (visible) {
        raw.classList.add('visible');
        raw.style.width = _rawWidth + 'px';
        if (resizer) resizer.classList.add('visible');
        _rebuildSyncAnchors();
        applyRawCollapse();
        syncRawFromContent();
    } else {
        raw.classList.remove('visible');
        raw.style.width = '0px';
        // Keep the divider through the collapse animation, then hide it.
        if (resizer) {
            setTimeout(function() {
                if (!_rawVisible) resizer.classList.remove('visible');
            }, 300);
        }
    }
}

function setRawSource(text) {
    var code = document.querySelector('#raw-source code');
    if (!code) return;
    code.textContent = '';
    var lines = text.split('\n');
    var inFence = false, fenceChar = '', fenceLen = 0;
    for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var stripped = line.replace(/^[ \t]+/, '');
        var fm = stripped.match(/^(`{3,}|~{3,})/);
        var hl = 0;
        if (!inFence && fm) {
            inFence = true; fenceChar = fm[1].charAt(0); fenceLen = fm[1].length;
        } else if (inFence && fm && fm[1].charAt(0) === fenceChar && fm[1].length >= fenceLen && stripped.slice(fm[1].length).trim() === '') {
            inFence = false;
        } else if (!inFence) {
            var hm = stripped.match(/^(#{1,6})\s/);
            if (hm) hl = hm[1].length;
        }
        var span = document.createElement('span');
        span.className = hl ? 'raw-line raw-h' : 'raw-line';
        if (hl) span.setAttribute('data-level', hl);
        span.textContent = line + (i < lines.length - 1 ? '\n' : '');
        code.appendChild(span);
        if (hl) {
            var ell = document.createElement('span');
            ell.className = 'raw-ellipsis';
            ell.textContent = '⋯\n';
            code.appendChild(ell);
        }
    }
    _rebuildSyncAnchors();
    applyRawCollapse();
}

// Mirror the rendered collapse state into the source pane: hide each collapsed
// section's body lines and reveal its ellipsis placeholder.
function applyRawCollapse() {
    var code = document.querySelector('#raw-source code');
    if (!code) return;
    var lines = code.querySelectorAll('.raw-line');
    var headingIdx = -1;
    var hideUntil = 0;
    for (var i = 0; i < lines.length; i++) {
        var el = lines[i];
        var isHeading = el.classList.contains('raw-h');
        var ellipsis = (isHeading && el.nextElementSibling && el.nextElementSibling.classList.contains('raw-ellipsis'))
            ? el.nextElementSibling : null;
        if (isHeading) {
            headingIdx++;
            var level = parseInt(el.getAttribute('data-level'), 10) || 1;
            if (hideUntil > 0 && level <= hideUntil) hideUntil = 0;
            if (hideUntil > 0) {
                el.style.display = 'none';
                if (ellipsis) ellipsis.style.display = 'none';
            } else {
                el.style.display = '';
                var rendered = _syncContentHeadings[headingIdx];
                if (rendered && rendered.classList.contains('collapsed')) {
                    if (ellipsis) ellipsis.style.display = 'inline';
                    hideUntil = level;
                } else if (ellipsis) {
                    ellipsis.style.display = 'none';
                }
            }
        } else {
            el.style.display = (hideUntil > 0) ? 'none' : '';
        }
    }
}

function setRawWidth(px) {
    // Cap at the viewport minus a reserve so the rendered pane never fully disappears.
    var maxW = Math.max(220, document.documentElement.clientWidth - 200);
    _rawWidth = Math.max(220, Math.min(maxW, px));
    if (_rawVisible) document.getElementById('raw-source').style.width = _rawWidth + 'px';
}

// Drag-to-resize the raw-source pane (anchored to the right edge).
(function() {
    var resizer = document.getElementById('raw-resizer');
    var raw = document.getElementById('raw-source');
    if (!resizer || !raw) return;
    var dragging = false;
    resizer.addEventListener('mousedown', function(e) {
        dragging = true;
        resizer.classList.add('dragging');
        raw.classList.add('no-transition');
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
        e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        setRawWidth(document.documentElement.clientWidth - e.clientX);
    });
    document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        resizer.classList.remove('dragging');
        raw.classList.remove('no-transition');
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.rawWidth) {
            window.webkit.messageHandlers.rawWidth.postMessage(_rawWidth);
        }
    });
})();

// ---- Header-anchored scroll-sync between the rendered view and the raw pane ----

function _rebuildSyncAnchors() {
    _syncContentHeadings = Array.prototype.slice.call(
        document.querySelectorAll('#content h1, #content h2, #content h3, #content h4, #content h5, #content h6'));
    _syncRawHeadings = Array.prototype.slice.call(
        document.querySelectorAll('#raw-source .raw-h'));
}

function syncRawFromContent() {
    if (!_rawVisible || _findScrolling) return;
    var ch = _syncContentHeadings, rh = _syncRawHeadings;
    var n = Math.min(ch.length, rh.length);
    if (n === 0) return;
    var content = _contentScroller();
    var contentTopVp = content.getBoundingClientRect().top, contentScroll = content.scrollTop;
    var raw = document.getElementById('raw-source');
    var rawTopVp = raw.getBoundingClientRect().top, rawScroll = raw.scrollTop;
    var y = contentScroll;
    function cTop(i) { return ch[i].getBoundingClientRect().top - contentTopVp + contentScroll; }
    function rTop(i) { return rh[i].getBoundingClientRect().top - rawTopVp + rawScroll; }
    var k = -1;
    for (var i = 0; i < n; i++) { if (cTop(i) <= y + 4) k = i; else break; }
    var target;
    if (k < 0) target = 0;
    else if (k >= n - 1) target = rTop(k);
    else {
        var c0 = cTop(k), c1 = cTop(k + 1);
        var frac = (y - c0) / Math.max(1, c1 - c0);
        target = rTop(k) + frac * (rTop(k + 1) - rTop(k));
    }
    _suppressRawSync = true;
    clearTimeout(_supRawTimer);
    _supRawTimer = setTimeout(function() { _suppressRawSync = false; }, 120);
    raw.scrollTop = target;
}

function syncContentFromRaw() {
    if (!_rawVisible || _findScrolling) return;
    var ch = _syncContentHeadings, rh = _syncRawHeadings;
    var n = Math.min(ch.length, rh.length);
    if (n === 0) return;
    var content = _contentScroller();
    var contentTopVp = content.getBoundingClientRect().top, contentScroll = content.scrollTop;
    var raw = document.getElementById('raw-source');
    var rawTopVp = raw.getBoundingClientRect().top, rawScroll = raw.scrollTop;
    var ry = rawScroll;
    function cTop(i) { return ch[i].getBoundingClientRect().top - contentTopVp + contentScroll; }
    function rTop(i) { return rh[i].getBoundingClientRect().top - rawTopVp + rawScroll; }
    var k = -1;
    for (var i = 0; i < n; i++) { if (rTop(i) <= ry + 4) k = i; else break; }
    var target;
    if (k < 0) target = 0;
    else if (k >= n - 1) target = cTop(k);
    else {
        var r0 = rTop(k), r1 = rTop(k + 1);
        var frac = (ry - r0) / Math.max(1, r1 - r0);
        target = cTop(k) + frac * (cTop(k + 1) - cTop(k));
    }
    _suppressContentSync = true;
    clearTimeout(_supContentTimer);
    _supContentTimer = setTimeout(function() { _suppressContentSync = false; }, 120);
    content.scrollTop = target;
}

var content = _contentScroller();
content.addEventListener('scroll', function() {
    if (!_rawVisible || _findScrolling) return;
    if (_suppressContentSync) { _suppressContentSync = false; return; }
    if (_syncRafC) return;
    _syncRafC = requestAnimationFrame(function() { _syncRafC = null; syncRawFromContent(); });
});

(function() {
    var raw = document.getElementById('raw-source');
    if (!raw) return;
    raw.addEventListener('scroll', function() {
        if (!_rawVisible || _findScrolling) return;
        if (_suppressRawSync) { _suppressRawSync = false; return; }
        if (_syncRafR) return;
        _syncRafR = requestAnimationFrame(function() { _syncRafR = null; syncContentFromRaw(); });
    });
})();

// Drag-to-resize the TOC; reports the final width back to the app to persist.
(function() {
    var resizer = document.getElementById('toc-resizer');
    var toc = document.getElementById('toc');
    if (!resizer || !toc) return;
    var dragging = false;
    resizer.addEventListener('mousedown', function(e) {
        dragging = true;
        resizer.classList.add('dragging');
        toc.classList.add('no-transition');
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
        e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        setTOCWidth(e.clientX - toc.getBoundingClientRect().left);
    });
    document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        resizer.classList.remove('dragging');
        toc.classList.remove('no-transition');
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.tocWidth) {
            window.webkit.messageHandlers.tocWidth.postMessage(_tocWidth);
        }
    });
})();

function setupTOCScrollHighlight() {
    // Debounced scroll handler to highlight active TOC entry
    var timeout;
    var content = _contentScroller();
    content.addEventListener('scroll', function() {
        clearTimeout(timeout);
        timeout = setTimeout(highlightActiveTOC, 50);
    });
}

function _scrollTOCLinkIntoView(link) {
    var toc = document.getElementById('toc');
    var tocFollowPadding = 24;
    var linkRect = link.getBoundingClientRect();
    var tocRect = toc.getBoundingClientRect();
    var activeTop = linkRect.top;
    var activeBottom = linkRect.bottom;
    var tocTop = tocRect.top;
    var tocBottom = tocRect.bottom;
    var targetScrollTop = toc.scrollTop;

    if (activeTop < tocTop + tocFollowPadding) {
        targetScrollTop = toc.scrollTop + activeTop - tocTop - tocFollowPadding;
    } else if (activeBottom > tocBottom - tocFollowPadding) {
        targetScrollTop = toc.scrollTop + activeBottom - tocBottom + tocFollowPadding;
    } else {
        return;
    }

    targetScrollTop = Math.max(0, Math.min(targetScrollTop, toc.scrollHeight - toc.clientHeight));
    toc.scrollTo({ top: targetScrollTop, behavior: 'smooth' });
}

function highlightActiveTOC() {
    var toc = document.getElementById('toc');
    if (!toc.classList.contains('visible')) return;

    var content = _contentScroller();
    var links = toc.querySelectorAll('a');
    var scrollTop = content.scrollTop;
    var contentTopVp = content.getBoundingClientRect().top;
    var activeLink = null;

    for (var i = 0; i < links.length; i++) {
        var target = document.getElementById(links[i].dataset.headingId);
        var targetTop = target
            ? target.getBoundingClientRect().top - contentTopVp + scrollTop
            : Infinity;
        if (targetTop <= scrollTop + 60) {
            activeLink = links[i];
        }
        links[i].classList.remove('active');
    }
    if (activeLink) {
        activeLink.classList.add('active');
        _scrollTOCLinkIntoView(activeLink);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    setupCollapsibleHeadings();
    if (_tocVisible) {
        buildTOC();
        setupTOCScrollHighlight();
    }
});

var _vimPending = null;
var _vimTimeout = null;

function _vimLineHeight() {
    var cs = getComputedStyle(document.body);
    var lh = parseFloat(cs.lineHeight);
    if (!isFinite(lh)) lh = parseFloat(cs.fontSize) * 1.5;
    return lh;
}

function _vimClearPending() {
    _vimPending = null;
    if (_vimTimeout) { clearTimeout(_vimTimeout); _vimTimeout = null; }
}

function _vimSetPending(key) {
    _vimPending = key;
    if (_vimTimeout) clearTimeout(_vimTimeout);
    _vimTimeout = setTimeout(_vimClearPending, 500);
}

function _vimJumpHeading(dir) {
    var all = document.querySelectorAll('h1, h2, h3, h4, h5, h6');
    var visible = [];
    for (var i = 0; i < all.length; i++) {
        if (all[i].offsetParent !== null) visible.push(all[i]);
    }
    var content = _contentScroller();
    var y = content.scrollTop;
    var threshold = 2;
    var target = null;
    if (dir > 0) {
        for (var i = 0; i < visible.length; i++) {
            if (visible[i].offsetTop > y + threshold) { target = visible[i]; break; }
        }
    } else {
        for (var i = visible.length - 1; i >= 0; i--) {
            if (visible[i].offsetTop < y - threshold) { target = visible[i]; break; }
        }
    }
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function _vimSendMessage(action) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.vim) {
        window.webkit.messageHandlers.vim.postMessage(action);
    }
}

window.addEventListener('keydown', function(e) {
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    if (e.metaKey || e.altKey) return;

    var key = e.key;
    var ctrl = e.ctrlKey;

    if (_vimPending === 'g' && key === 'g' && !ctrl) {
        _vimClearPending();
        _contentScroller().scrollTo({ top: 0, behavior: 'smooth' });
        e.preventDefault();
        return;
    }
    if (_vimPending === ']' && key === ']' && !ctrl) {
        _vimClearPending();
        _vimJumpHeading(1);
        e.preventDefault();
        return;
    }
    if (_vimPending === '[' && key === '[' && !ctrl) {
        _vimClearPending();
        _vimJumpHeading(-1);
        e.preventDefault();
        return;
    }
    if (_vimPending) _vimClearPending();

    if (ctrl) {
        var content = _contentScroller();
        var vh = content.clientHeight;
        if (key === 'd') { content.scrollBy({ top: vh / 2, behavior: 'smooth' }); e.preventDefault(); return; }
        if (key === 'u') { content.scrollBy({ top: -vh / 2, behavior: 'smooth' }); e.preventDefault(); return; }
        if (key === 'f') { content.scrollBy({ top: vh, behavior: 'smooth' }); e.preventDefault(); return; }
        if (key === 'b') { content.scrollBy({ top: -vh, behavior: 'smooth' }); e.preventDefault(); return; }
        return;
    }

    switch (key) {
        case 'j':
            _contentScroller().scrollBy({ top: _vimLineHeight(), behavior: 'smooth' });
            e.preventDefault();
            break;
        case 'k':
            _contentScroller().scrollBy({ top: -_vimLineHeight(), behavior: 'smooth' });
            e.preventDefault();
            break;
        case 'G':
            var content = _contentScroller();
            content.scrollTo({ top: content.scrollHeight, behavior: 'smooth' });
            e.preventDefault();
            break;
        case 'g':
            _vimSetPending('g');
            e.preventDefault();
            break;
        case ']':
            _vimSetPending(']');
            e.preventDefault();
            break;
        case '[':
            _vimSetPending('[');
            e.preventDefault();
            break;
        case 'n':
            if (_findMatches.length > 0) _vimSendMessage('findNext');
            e.preventDefault();
            break;
        case 'N':
            if (_findMatches.length > 0) _vimSendMessage('findPrev');
            e.preventDefault();
            break;
        case '/':
            _vimSendMessage('focusFind');
            e.preventDefault();
            break;
        case 'Escape':
            clearFind();
            e.preventDefault();
            break;
    }
});
</script>
