name: markdownViewr
options:
  bundleIdPrefix: com.dkelkhoff
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release
  Debug-MAS: debug
  Release-MAS: release

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.4.0"
  sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.0.0"

targets:
  markdownViewrTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - markdownViewrTests
    dependencies:
      - target: markdownViewr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dkelkhoff.markdownViewrTests
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: YES

  markdownViewr:
    type: application
    platform: macOS
    sources:
      - markdownViewr
    resources:
      - markdownViewr/Resources
    dependencies:
      - package: swift-markdown
        product: Markdown
      - package: sparkle
        product: Sparkle
    settings:
      base:
        INFOPLIST_FILE: markdownViewr/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dkelkhoff.markdownViewr
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "3"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug-MAS:
          CODE_SIGN_ENTITLEMENTS: markdownViewr/markdownViewr-MAS.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MAS_BUILD"
        Release-MAS:
          CODE_SIGN_ENTITLEMENTS: markdownViewr/markdownViewr-MAS.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) MAS_BUILD"
    postBuildScripts:
      - name: Strip Sparkle keys from MAS bundle
        script: |
          if [[ "${CONFIGURATION}" == *MAS* ]]; then
            PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
            /usr/libexec/PlistBuddy -c "Delete :SUFeedURL" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "$PLIST" 2>/dev/null || true
          fi
    info:
      path: markdownViewr/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - markdown
              - mdown
              - mkd
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: "public.app-category.productivity"
        SUFeedURL: "https://raw.githubusercontent.com/darinkelkhoff/markdownViewr/main/appcast.xml"
        SUPublicEDKey: "flXZnzfoR5H/JgMTtAGza8SUcUbfK4FWUPEBjxkSZyc="
