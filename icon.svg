<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f5"/>
      <stop offset="100%" stop-color="#d8d8e0"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c0cc"/>
      <stop offset="100%" stop-color="#a8a8b8"/>
    </linearGradient>
    <linearGradient id="magGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c6faa"/>
      <stop offset="100%" stop-color="#5a4f8a"/>
    </linearGradient>
    <linearGradient id="mdGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5ea0"/>
      <stop offset="100%" stop-color="#4a3d7a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="magShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Document body -->
  <g filter="url(#shadow)">
    <path d="M200,80 L680,80 L824,224 L824,944 L200,944 Z" fill="url(#docGrad)" stroke="#b0b0bc" stroke-width="3"/>
    <path d="M680,80 L680,224 L824,224 Z" fill="url(#foldGrad)" stroke="#b0b0bc" stroke-width="2"/>
    <path d="M680,80 L824,224" fill="none" stroke="#a0a0b0" stroke-width="1.5"/>
  </g>

  <!-- M — large, left of center -->
  <text x="420" y="520" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="380" font-weight="800" fill="url(#mdGrad)">M</text>

  <!-- Down arrow — drawn as a thick custom arrow, clearly visible -->
  <g fill="url(#mdGrad)">
    <!-- Arrow shaft -->
    <rect x="610" y="260" width="50" height="260" rx="6"/>
    <!-- Arrow head (triangle) -->
    <polygon points="635,560 560,460 710,460"/>
  </g>

  <!-- Magnifying glass — bottom right, overlapping doc edge -->
  <g filter="url(#magShadow)" transform="translate(620, 640)">
    <circle cx="100" cy="100" r="100" fill="none" stroke="url(#magGrad)" stroke-width="28"/>
    <circle cx="100" cy="100" r="86" fill="#9085c0" fill-opacity="0.15"/>
    <ellipse cx="68" cy="68" rx="34" ry="22" fill="white" fill-opacity="0.3" transform="rotate(-30, 68, 68)"/>
    <line x1="176" y1="176" x2="280" y2="280" stroke="url(#magGrad)" stroke-width="32" stroke-linecap="round"/>
  </g>
</svg>
